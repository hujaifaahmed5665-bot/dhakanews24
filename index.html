<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dhaka News 24 - Automated Photocard Generator</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Hind Siliguri', sans-serif; }
        .vertical-text { writing-mode: vertical-lr; text-transform: uppercase; transform: rotate(180deg); }
    </style>
</head>
<body class="bg-slate-900 min-h-screen text-slate-100 flex items-center justify-center p-4 md:p-8">

    <div class="w-full max-w-6xl grid grid-cols-1 lg:grid-cols-2 gap-8 bg-slate-800 p-6 rounded-2xl shadow-2xl border border-slate-700">
        
        <div class="flex flex-col justify-between space-y-6 bg-slate-850 p-4 rounded-xl">
            <div>
                <h2 class="text-2xl font-bold text-yellow-400 border-b border-slate-700 pb-3 mb-6">Dhaka News 24 Control Panel</h2>
                
                <div class="space-y-2 mb-6">
                    <label class="block text-sm font-semibold text-slate-300">নিউজ লিংক দিন (অটোমেটিক শিরোনাম ও ছবি আসবে):</label>
                    <div class="flex gap-2">
                        <input type="url" id="newsUrl" placeholder="এখানে নিউজের লিংক পেস্ট করুন..." class="flex-1 px-4 py-2.5 bg-slate-700 border border-slate-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-500 text-sm text-white placeholder-slate-400">
                        <button onclick="fetchNewsData()" id="fetchBtn" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-lg text-sm font-bold transition shadow-md">লিংক খুঁজুন</button>
                    </div>
                </div>

                <div class="relative flex py-3 items-center">
                    <div class="flex-grow border-t border-slate-700"></div>
                    <span class="flex-shrink mx-4 text-slate-500 text-xs uppercase font-bold tracking-wider">অথবা ম্যানুয়ালি এডিট করুন</span>
                    <div class="flex-grow border-t border-slate-700"></div>
                </div>

                <div class="space-y-4 mt-4">
                    <div>
                        <label class="block text-sm font-semibold text-slate-300 mb-1">নিউজ হেডলাইন (Bangla Headline):</label>
                        <textarea id="inputHeadline" rows="3" class="w-full px-4 py-2 bg-slate-700 border border-slate-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-500 text-sm text-white" placeholder="এখানে নিউজের শিরোনাম লিখুন বা এডিট করুন..."></textarea>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-semibold text-slate-300 mb-1">কম্পিউটার থেকে ছবি আপলোড করুন:</label>
                        <input type="file" id="inputImage" accept="image/*" class="w-full text-sm text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-slate-700 file:text-slate-200 hover:file:bg-slate-600 cursor-pointer">
                    </div>
                </div>
            </div>

            <button onclick="downloadCard()" class="w-full bg-red-600 hover:bg-red-700 text-white py-4 rounded-xl font-bold text-lg transition shadow-lg flex items-center justify-center gap-2 mt-6">
                📥 ১-ক্লিকে এইচডি ফটোকার্ড ডাউনলোড করুন
            </button>
        </div>

        <div class="flex flex-col items-center justify-center bg-slate-950 p-6 rounded-xl border border-slate-700">
            <span class="text-xs font-bold text-slate-500 mb-4 uppercase tracking-widest">লাইভ ফটোকার্ড প্রিভিউ</span>
            
            <div id="photocard-canvas" class="relative bg-black shadow-2xl overflow-hidden select-none" style="width: 432px; height: 540px;">
                
                <div class="w-full h-[58%] overflow-hidden bg-slate-900 relative">
                    <img id="cardImage" src="https://images.unsplash.com/photo-1585829365295-ab7cd400c167?w=800" class="w-full h-full object-cover" crossorigin="anonymous">
                </div>

                <div class="w-full h-[42%] bg-[#490202] relative px-6 pt-9 flex flex-col justify-between pb-5">
                    <div class="absolute inset-0 opacity-5" style="background-image: radial-gradient(#ffffff 1px, transparent 1px); background-size: 8px 8px;"></div>
                    
                    <div class="absolute left-6 -top-10 bottom-6 w-11 bg-[#facc15] flex flex-col items-center py-3 justify-start shadow-xl z-10">
                        <div class="w-8 h-8 rounded-full bg-white flex items-center justify-center overflow-hidden mb-2 p-0.5 shadow-sm">
                            <span class="text-[6px] font-bold text-red-700 text-center leading-none tracking-tighter">Dhaka<br>News24</span>
                        </div>
                        <div class="vertical-text text-[11px] font-bold text-black tracking-[0.15em] mt-1">
                            Dhaka News 24
                        </div>
                    </div>

                    <div class="pl-14 pr-2 flex-1 flex items-start">
                        <h1 id="cardHeadline" class="text-white text-[20px] font-bold leading-snug tracking-wide text-left">
                            এখানে আপনার নিউজের আকর্ষণীয় হেডলাইনটি স্বয়ংক্রিয়ভাবে অথবা ম্যানুয়ালি চলে আসবে।
                        </h1>
                    </div>

                    <div class="pl-14 flex items-center justify-between border-t border-red-900/40 pt-2 text-white/75 text-[10px] z-10">
                        <div class="flex items-center gap-1.5">
                            <span class="w-2 h-2 bg-[#facc15] inline-block"></span>
                            <span>Follow Us On: <strong class="text-white">Dhaka News 24</strong></span>
                        </div>
                    </div>
                </div>

            </div>
        </div>

    </div>

    <script>
        const inputHeadline = document.getElementById('inputHeadline');
        const cardHeadline = document.getElementById('cardHeadline');
        
        inputHeadline.addEventListener('input', (e) => {
            cardHeadline.innerText = e.target.value || "এখানে আপনার নিউজের শিরোনাম আসবে।";
        });

        document.getElementById('inputImage').addEventListener('change', function(e) {
            if (e.target.files && e.target.files[0]) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    document.getElementById('cardImage').src = event.target.result;
                };
                reader.readAsDataURL(e.target.files[0]);
            }
        });

        async function fetchNewsData() {
            const url = document.getElementById('newsUrl').value.trim();
            const fetchBtn = document.getElementById('fetchBtn');
            if(!url) return alert('অনুগ্রহ করে আগে একটি বৈধ লিংক পেস্ট করুন!');

            fetchBtn.innerText = "খোঁজা হচ্ছে...";
            fetchBtn.disabled = true;

            try {
                const response = await fetch(`https://api.microlink.io/?url=${encodeURIComponent(url)}`);
                const json = await response.json();

                if(json.status === 'success' && json.data && json.data.title) {
                    const data = json.data;
                    inputHeadline.value = data.title;
                    cardHeadline.innerText = data.title;
                    if(data.image && data.image.url) {
                        document.getElementById('cardImage').src = `https://images.weserv.nl/?url=${encodeURIComponent(data.image.url)}`;
                    }
                    finalizeFetch();
                    return;
                }
            } catch (error) { console.log("Engine 1 block, switching to backup..."); }

            try {
                const fallbackResponse = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`);
                const fallbackJson = await fallbackResponse.json();
                
                if (fallbackJson && fallbackJson.contents) {
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(fallbackJson.contents, 'text/html');
                    
                    const scrapedTitle = doc.querySelector('meta[property="og:title"]')?.getAttribute('content') || 
                                         doc.querySelector('meta[name="twitter:title"]')?.getAttribute('content') || 
                                         doc.title;
                                         
                    const scrapedImage = doc.querySelector('meta[property="og:image"]')?.getAttribute('content') || 
                                         doc.querySelector('meta[name="twitter:image"]')?.getAttribute('content');

                    if (scrapedTitle) {
                        inputHeadline.value = scrapedTitle;
                        cardHeadline.innerText = scrapedTitle;
                        if (scrapedImage) {
                            document.getElementById('cardImage').src = `https://images.weserv.nl/?url=${encodeURIComponent(scrapedImage)}`;
                        }
                        finalizeFetch();
                        return;
                    }
                }
            } catch (fbErr) { console.error(fbErr); }

            alert('লিংকটি সিকিউরিটির কারণে সম্পূর্ণ লক করা। দয়া করে শিরোনামটি কপি করে নিচে বসান এবং ছবি আপলোড করে নিন!');
            finalizeFetch();
        }

        function finalizeFetch() {
            document.getElementById('fetchBtn').innerText = "লিংক খুঁজুন";
            document.getElementById('fetchBtn').disabled = false;
        }

        function downloadCard() {
            const container = document.getElementById('photocard-canvas');
            
            html2canvas(container, {
                scale: 2.5,
                useCORS: true,
                allowTaint: false,
                logging: false
            }).then(canvas => {
                const link = document.createElement('a');
                const titleSlug = inputHeadline.value.substring(0, 12).replace(/\s+/g, '-');
                link.download = `${titleSlug || 'news'}-dhakanews24.jpg`;
                link.href = canvas.toDataURL('image/jpeg', 0.98);
                link.click();
            });
        }
    </script>
</body>
</html>
